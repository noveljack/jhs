name: daily

# Screener daily EOD refresh (ci.py mode 1).
#
# A single job handles EVERYTHING in one sequential pass:
#   pull Drive data -> ingest bhavcopy + dims -> recompute indicators ->
#   Kronos forward-strength (every symbol) -> refresh news -> build dashboard
#   + screener + charts -> push bulk data to Drive -> commit dims +
#   dashboard JSON + built dist to git.
#
# Single-job because there is nothing to shard:
#   - no intraday collect
#   - no screen shards (Kronos loop runs inside daily.py via ThreadPoolExecutor)
#   - dashboard build happens at the end of the same job
#
# Runs Mon-Sat 17:05 IST (11:35 UTC) -- after NSE data is typically available.
# Also triggerable via workflow_dispatch or repository_dispatch.

on:
  schedule:
    - cron: "35 11 * * 1-6"
  workflow_dispatch:
  repository_dispatch:
    types: [daily]

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: "$\u007B\u007B secrets.SCREENER_TOKEN \u007D\u007D"
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Restore the Kronos model weights; the daily run does a REAL forward-
      # strength compute for EVERY symbol so the cache must be warm.
      # The cache is written by the weekly prewarm job (see prewarm.yml).
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kronos-NeoQuasar-Kronos-small-v2

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt -r requirements-halal.txt
          pip install \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            -r requirements-ml.txt

      - name: Run daily EOD refresh
        run: python ci.py 1
        env:
          CTX: "$\u007B\u007B toJSON(secrets) \u007D\u007D"
          VARS: "$\u007B\u007B toJSON(vars) \u007D\u007D"
