name: a

on:
  schedule:
    - cron: "35 11 * * 1-6"
  workflow_dispatch:
  repository_dispatch:
    types: [a]

concurrency:
  group: a
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          repository: $ secrets.REPO_NAME 
          token: $ secrets.REPO_TOKEN 
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: python ci.py 1
        env:
          CTX: $ toJSON(secrets) 
          VARS: $ toJSON(vars) 
