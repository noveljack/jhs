name: a

on:
  schedule:
    - cron: "35 11 * * 1-6"
  workflow_dispatch:
  repository_dispatch:
    types: [a]

concurrency:
  group: a
  cancel-in-progress: false

jobs:
  prewarm-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kronos-NeoQuasar-Kronos-small-v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install "huggingface-hub>=0.23"

      - run: |
          python -c "from huggingface_hub import snapshot_download; snapshot_download('NeoQuasar/Kronos-small'); snapshot_download('NeoQuasar/Kronos-Tokenizer-base')"

  run:
    needs: prewarm-model
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: "$\u007B\u007B secrets.SCREENER_TOKEN \u007D\u007D"
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kronos-NeoQuasar-Kronos-small-v2

      - run: |
          pip install -r requirements.txt -r requirements-halal.txt
          pip install \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            -r requirements-ml.txt

      - run: python ci.py 1
        env:
          CTX: "$\u007B\u007B toJSON(secrets) \u007D\u007D"
          VARS: "$\u007B\u007B toJSON(vars) \u007D\u007D"
