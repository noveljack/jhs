name: d

on:
  workflow_dispatch:
  repository_dispatch:
    types: [d]

concurrency:
  group: d
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: "$\u007B\u007B secrets.SCREENER_TOKEN \u007D\u007D"
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python ci.py 11 indicators
        env:
          CTX: "$\u007B\u007B toJSON(secrets) \u007D\u007D"
          VARS: "$\u007B\u007B toJSON(vars) \u007D\u007D"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: "$\u007B\u007B secrets.SCREENER_TOKEN \u007D\u007D"
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python ci.py 4
        env:
          CTX: "$\u007B\u007B toJSON(secrets) \u007D\u007D"
          VARS: "$\u007B\u007B toJSON(vars) \u007D\u007D"
