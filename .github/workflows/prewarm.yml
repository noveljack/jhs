name: prewarm

# Download and cache the Kronos model weights (public Hugging Face models).
# Runs weekly (Sunday 02:00 UTC) so the daily job always finds a warm cache.
# Also triggerable manually before the first daily run.
#
# No secrets needed: the models are public on Hugging Face Hub.

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
  repository_dispatch:
    types: [prewarm]

concurrency:
  group: prewarm
  cancel-in-progress: false

jobs:
  prewarm-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kronos-NeoQuasar-Kronos-small-v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface-hub
        run: pip install "huggingface-hub>=0.23"

      - name: Download Kronos model + tokenizer
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download('NeoQuasar/Kronos-small')
          snapshot_download('NeoQuasar/Kronos-Tokenizer-base')
          "
