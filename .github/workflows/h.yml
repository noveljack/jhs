name: h

on:
  schedule:
    - cron: "0 9 3 * *"
  workflow_dispatch:
  repository_dispatch:
    types: [h]

concurrency:
  group: h
  cancel-in-progress: false

jobs:
  halal-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          repository: "$\u007B\u007B secrets.SCREENER_REPO \u007D\u007D"
          token: "$\u007B\u007B secrets.SCREENER_TOKEN \u007D\u007D"
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt -r requirements-halal.txt

      - run: python ci.py 9
        env:
          CTX: "$\u007B\u007B toJSON(secrets) \u007D\u007D"
          VARS: "$\u007B\u007B toJSON(vars) \u007D\u007D"

  notify:
    needs: [halal-scan]
    if: failure()
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: "$\u007B\u007B secrets.TELEGRAM_BOT_TOKEN \u007D\u007D"
      TG_CHAT: "$\u007B\u007B secrets.TELEGRAM_CHAT_ID \u007D\u007D"
      WF_NAME: "$\u007B\u007B github.workflow \u007D\u007D"
      RUN_URL: "$\u007B\u007B github.server_url \u007D\u007D/$\u007B\u007B github.repository \u007D\u007D/actions/runs/$\u007B\u007B github.run_id \u007D\u007D"
    steps:
      - name: Alert on failure
        if: env.TG_TOKEN != '' && env.TG_CHAT != ''
        run: |
          curl -sS --max-time 30 \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=jhs workflow ${WF_NAME} failed. Run: ${RUN_URL}"
