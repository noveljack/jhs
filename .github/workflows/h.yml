name: h

on:
  schedule:
    - cron: "0 9 3 * *"
  workflow_dispatch:
  repository_dispatch:
    types: [h]

concurrency:
  group: h
  cancel-in-progress: false

jobs:
  halal-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: "$\u007B\u007B secrets.SCREENER_TOKEN \u007D\u007D"
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt -r requirements-halal.txt

      - run: python ci.py 9
        env:
          CTX: "$\u007B\u007B toJSON(secrets) \u007D\u007D"
          VARS: "$\u007B\u007B toJSON(vars) \u007D\u007D"
