name: f

on:
  schedule:
    - cron: "0 8 2 * *"
  workflow_dispatch:
  repository_dispatch:
    types: [f]

concurrency:
  group: f
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          repository: $ secrets.REPO_NAME 
          token: $ secrets.REPO_TOKEN 
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: pip install -r requirements.txt

      - run: python ci.py 6
        env:
          CTX: $ toJSON(secrets) 
          VARS: $ toJSON(vars) 
